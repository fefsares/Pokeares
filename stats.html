<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Stats</title>
        <link rel="icon" type="image/x-icon" href="assets/icon.png">

        <!--Font Sora-->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Sora:wght@100..800&display=swap" rel="stylesheet">

        <!--Font Awesome-->
        <script src="https://kit.fontawesome.com/ffda54e860.js" crossorigin="anonymous"></script>

        <!--Fonte Pixel-->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Sora:wght@100..800&display=swap" rel="stylesheet">
        
        <!--Link bootstrap-->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <!-- CDN do Bootstrap Icons -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">


        <link href="css/style.css" rel="stylesheet">
        <link href="css/style_stats.css" rel="stylesheet">

        <!--PokeAPI-->
        <script src="https://unpkg.com/pokeapi-js-wrapper/dist/index.js"></script>

        <script src="js/script.js"></script>

        <!--html5shiv-->
        <!--[if lt IE 9]>
            <script src="bower_components/html5shiv/dist/html5shiv.js"></script>
        <![endif]-->

    </head>
    <body>
        <section>
            <div id="comparacao_stats" class="container d-flex align-items-center justify-content-center flex-column text-center" style="min-height: 100vh;">
                <a id="btn-voltar" class="btn btn-danger" href="index.html">Voltar</a>
                <div class="row align-items-center justify-content-around w-100">
                    <div class="col-lg-4">
                        <div class="card-poke" id="poke1">
                        <h1 id="poke_name1" class="text-wrap"></h1>
                        <p class="h4" id="poke_id1"></p>
                        <div id="poke_img1"></div>
                        <div>
                            <form>
                                <input class="form-control" id="nomePokemon1" type="text" placeholder="Digite um pokémon...">
                            </form>
                        </div>
                        </div>
                    </div>
                    
                    <div class="col-lg-4">
                        <div id="stats_comparar">
                            <h6 class="display-6">HP</h4>
                            <p class="p_stat"></p>
                            <div class="bar">
                                <div class="left"></div>
                                <div class="right"></div>
                            </div>
                            <h6 class="display-6">Ataque</h4>
                            <p class="p_stat"></p>
                            <div class="bar">
                                <div class="left"></div>
                                <div class="right"></div>
                            </div>
                            <h6 class="display-6">Defesa</h4>
                            <p class="p_stat"></p>
                            <div class="bar">
                                <div class="left"></div>
                                <div class="right"></div>
                            </div>
                            <h6 class="display-6">Ataque especial</h4>
                            <p class="p_stat"></p>
                            <div class="bar">
                                <div class="left"></div>
                                <div class="right"></div>
                            </div>
                            <h6 class="display-6">Defesa especial</h4>
                            <p class="p_stat"></p>
                            <div class="bar">
                                <div class="left"></div>
                                <div class="right"></div>
                            </div>
                            <h6 class="display-6">Velocidade</h4> 
                            <p class="p_stat"></p>
                            <div class="bar">
                                <div class="left"></div>
                                <div class="right"></div>
                            </div>
                        </div>
                    </div>

                    <div class="col-lg-4">
                        <div class="card-poke" id="poke2">
                            <h1 id="poke_name2" class="h2 text-wrap"></h1>
                            <p class="h4" id="poke_id2"></p>
                            <div id="poke_img2"></div>
                            <div>
                                <form onsubmit="event.preventDefault()">
                                    <input class="form-control " id="nomePokemon2" type="text" placeholder="Digite um pokémon...">
                                </form>
                            </div>
                        </div>
                    </div>

                </div>
                <button type="button" class="btn btn-danger mt-5" onclick="buscar_stats()">Buscar</button>
            </div>
        </section>
        <!--Links do bootstrap-->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
